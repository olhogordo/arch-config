icons_format = " <span font_family='JetBrainsMono Nerd Font'>{icon}</span> "

[theme]
theme = "gruvbox-dark"

[icons]
icons = "material-nf"

[[block]]
block = "custom"
command = "echo ' '"
interval = "once"

[[block]]
block = "disk_space"
path = "/"
alias = "/"
info_type = "available"
unit = "GB"
interval = 60
warning = 20.0
alert = 10.0
format = " $icon $available "

[[block]]
block = "memory"
format = " $icon $mem_used_percents "
format_alt = " $icon $swap_used_percents "
interval = 5
warning_mem = 80
critical_mem = 95

[[block]]
block = "cpu"
interval = 5
format = " $icon $utilization "

[[block]]
block = "temperature"
interval = 10
format = " $icon $max "
chip = "*-isa-*"

[[block]]
block = "net"
device = "wlan0"
format = " $icon $ssid "
format_alt = " $icon $ssid, $ip "
interval = 5
missing_format = ""

[[block]]
block = "sound"
driver = "pulseaudio"
format = " $icon $volume "
headphones_indicator = true
step_width = 5

[[block]]
block = "battery"
driver = "upower"
format = " $icon $percentage "
format_alt = " $icon $percentage $time "
full_format = " $icon $percentage "
interval = 30
missing_format = ""

[[block]]
block = "time"
interval = 60
format = " $icon $timestamp.datetime(f:'%a %d %b %R') "
