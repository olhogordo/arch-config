icons_format = " {icon} "

[theme]
theme = "gruvbox-dark"

[icons]
icons = "material-nf"

[[block]]
block = "cpu"
interval = 5
format = " $icon $utilization "

[[block]]
block = "memory"
format = " $icon $mem_used_percents "
format_alt = " $icon $swap_used_percents "
interval = 5
warning_mem = 80
critical_mem = 95

[[block]]
block = "disk_space"
path = "/"
alias = "/"
info_type = "available"
unit = "GB"
interval = 60
warning = 20.0
alert = 10.0
format = " $icon $available "

[[block]]
block = "sound"
format = " $icon $volume "
interval = 5
missing_format = ""

[[block]]
block = "time"
interval = 60
format = " $icon $timestamp.datetime(f:'%a %d %b %R') "
