# ==========================================================
# MPD - CONFIGURAÇÃO MINIMALISTA
# ==========================================================

# Localização da sua biblioteca de música
music_directory "~/mid/music"
playlist_directory "~/.config/mpd/playlists"
db_file "~/.config/mpd/mpd.db"
log_file "~/.config/mpd/mpd.log"
pid_file "~/.config/mpd/mpd.pid"
state_file "~/.config/mpd/mpdstate"

# Rede (escuta apenas localmente por segurança)
bind_to_address "127.0.0.1"
port "6600"

# Áudio (usa PulseAudio/PipeWire automaticamente)
audio_output {
    type "alsa"
    name "ALSA Default Device"
    device "default"
    mixer_type "software"
}

# Atualização automática da biblioteca quando adicionar músicas
auto_update "yes"
auto_update_depth "3"

